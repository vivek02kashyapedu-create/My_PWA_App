<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My PWA App</title>

  <!-- Manifest embedded directly -->
  <link rel="manifest" href="data:application/json,{
    &quot;name&quot;:&quot;My PWA App&quot;,
    &quot;short_name&quot;:&quot;PWAApp&quot;,
    &quot;start_url&quot;:&quot;index.html&quot;,
    &quot;display&quot;:&quot;standalone&quot;,
    &quot;background_color&quot;:&quot;#ffffff&quot;,
    &quot;theme_color&quot;:&quot;#000000&quot;
  }">

  <style>
    body { font-family: Arial, sans-serif; margin: 20px; }
    form { margin-bottom: 20px; }
    input { margin: 5px; padding: 8px; }
    button { padding: 8px 12px; }
    #welcome { font-weight: bold; margin-top: 10px; }
  </style>
</head>
<body>
  <h1>My PWA App</h1>

  <!-- Login Form -->
  <form id="loginForm">
    <input type="text" id="username" placeholder="Username" required>
    <input type="password" id="password" placeholder="Password" required>
    <button type="submit">Login</button>
  </form>

  <p id="welcome"></p>

  <script>
    // Service Worker inline definition
    const swCode = `
      self.addEventListener("install", event => {
        event.waitUntil(
          caches.open("app-cache").then(cache => {
            return cache.addAll(["/index.html"]);
          })
        );
      });

      self.addEventListener("fetch", event => {
        event.respondWith(
          caches.match(event.request).then(response => response || fetch(event.request))
        );
      });
    `;

    // Register Service Worker dynamically
    if ("serviceWorker" in navigator) {
      const blob = new Blob([swCode], { type: "application/javascript" });
      const swUrl = URL.createObjectURL(blob);
      navigator.serviceWorker.register(swUrl);
    }

    // Login + Memory Support
    document.addEventListener("DOMContentLoaded", () => {
      const loginForm = document.getElementById("loginForm");
      const welcome = document.getElementById("welcome");

      if (localStorage.getItem("user")) {
        welcome.textContent = "Welcome back, " + localStorage.getItem("user");
      }

      loginForm.addEventListener("submit", e => {
        e.preventDefault();
        const user = document.getElementById("username").value;
        const pass = document.getElementById("password").value;

        // Save credentials locally
        localStorage.setItem("user", user);
        localStorage.setItem("pass", pass);

        welcome.textContent = "Login successful! Welcome, " + user;
      });
    });
  </script>
</body>
</html>
